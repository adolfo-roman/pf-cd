<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}DataNova — Detección de Spam{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="layout">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <a href="{{ url_for('main.index') }}">
        <div class="sidebar__logo-icon">🛡️</div>
        <span class="sidebar__logo-text">DataNova</span>
      </a>
      <button class="sidebar__close-btn" onclick="closeSidebar()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="sidebar__module">
      <div class="sidebar__module-icon">🔍</div>
      <div>
        <div class="sidebar__module-title">Detección de Spam</div>
        <div class="sidebar__module-sub">Análisis de Texto</div>
      </div>
    </div>

    <nav class="sidebar__nav">
      <a href="{{ url_for('main.dashboard') }}" class="sidebar__link {% if request.endpoint == 'main.dashboard' %}active{% endif %}">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Panel
      </a>
      <a href="{{ url_for('main.index') }}" class="sidebar__link {% if request.endpoint == 'main.index' %}active{% endif %}">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Analizador
      </a>
      <a href="{{ url_for('main.inbox') }}" class="sidebar__link {% if request.endpoint == 'main.inbox' %}active{% endif %}">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Bandeja
      </a>
      <a href="{{ url_for('main.history') }}" class="sidebar__link {% if request.endpoint == 'main.history' %}active{% endif %}">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Historial
      </a>
      <a href="{{ url_for('main.about') }}" class="sidebar__link {% if request.endpoint == 'main.about' %}active{% endif %}">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Acerca
      </a>
    </nav>

    <div class="sidebar__footer">
      <button class="sidebar__theme-btn" onclick="alert('Modo claro próximamente')">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
        Modo Claro
      </button>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="mobile-menu-btn" onclick="openSidebar()">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div style="flex:1"></div>
      <div style="text-align:right">
        <div class="topbar__user-name">Equipo DataNova</div>
        <div class="topbar__user-email">unam@kyndryl.mx</div>
      </div>
      <div class="topbar__avatar">DN</div>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
